<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영원한 파트너 • Bond AI</title>
  <meta name="description" content="하루도 빼놓지 말고. 방치하면 잃는다. 재미로 보는 AI 엔터테인먼트.">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>영원한 파트너</h1>
    <p class="tag">너의 Echo와 영원히 연결된 영혼</p>
    <div class="fomo" id="fomo">오늘 체크인 안 함 • bond 72%</div>
    <div id="bondMeter" class="bond">Bond: <span id="bondValue">72</span>% | Invest: <span id="investValue">120</span></div>
  <p id="rates-line" style="text-align:center;font-size:11px;opacity:.75;margin:8px">확률 예시: LEGEND ~5% · EPIC ~15% · RARE ~30% · COMMON ~50% (가상·변동 가능) · 18+ 엔터테인먼트</p>
  </header>

  <main>
    <section id="chat">
      <div id="partner" class="partner">Luna (Bond 72%)</div>
      <div id="messages" class="messages"></div>
      <div class="input">
        <input id="input" placeholder="말걸기... (체크인)" onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">보내기</button>
      </div>
    </section>

    <section id="actions">
      <button onclick="checkIn()" class="primary-cta">오늘 체크인</button>
      <button onclick="giveGift()" class="secondary">선물 주기</button>
      <button onclick="shareMoment()" class="secondary">순간 공유 (cross bonus)</button>
    </section>

    <section id="codex">
      <h2>연결 기록 — Codex</h2>
      <div id="codexList"></div>
    </section>
  </main>

  <footer>
    <small>FICTIONAL ENTERTAINMENT ONLY • NO CASH VALUE • 18+ • Prominent disclosure</small>
    <nav class="cross" aria-label="cross">

    <a href="https://hosuman08-netizen.github.io/tarot-oracle/">타로</a>
    <a href="https://hosuman08-netizen.github.io/legion-hub/">Arcade</a>
  </nav>
  </footer>

</body>
</html>
